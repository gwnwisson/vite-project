name: toto

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: gwensws
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: checkout
        uses: actions/checkout@v4
      - name: build
        run: docker build -t gwensws/vite-project .
      - name: push
        run: docker push gwensws/vite-project